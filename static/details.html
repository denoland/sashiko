<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sashiko - Patch Details</title>
    <style>
        body { font-family: monospace; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f5f5f5; }
        h1 { border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .section { margin-bottom: 20px; background: white; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .section h2 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .kv { display: grid; grid-template-columns: 150px 1fr; gap: 10px; margin-bottom: 5px; }
        .label { font-weight: bold; color: #555; }
        .status-Pending { color: orange; }
        .status-Applied { color: green; }
        .status-Failed { color: red; }
        .tag { display: inline-block; background: #e0f7fa; color: #006064; padding: 1px 4px; border-radius: 3px; font-size: 0.75em; margin-right: 4px; border: 1px solid #b2ebf2; vertical-align: middle; }
        .reviews-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .reviews-table th, .reviews-table td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .copy-btn { cursor: pointer; border: 1px solid #ccc; background: #fff; padding: 2px 5px; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>
    <a href="/">← Back to List</a>
    <h1>Patch Details</h1>
    <div id="content">Loading...</div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
        }

        async function fetchDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('content').innerHTML = 'No ID provided.';
                return;
            }

            try {
                // The ID is passed as message_id, which might contain characters needing encoding
                const res = await fetch(`/api/patch?id=${encodeURIComponent(id)}`);
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`${res.status} ${res.statusText}: ${text}`);
                }
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('content').innerHTML = `Error loading details: ${e.message}`;
            }
        }

        function render(data) {
            const date = new Date(data.date * 1000).toLocaleString();
            
            let reviewsHtml = '';
            if (data.reviews && data.reviews.length > 0) {
                reviewsHtml = `
                    <table class="reviews-table">
                        <thead>
                            <tr>
                                <th>Provider/Model</th>
                                <th>Baseline</th>
                                <th>Prompts</th>
                                <th>Result</th>
                                <th>Summary</th>
                                <th>Date</th>
                                <th>Links</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.reviews.map(r => {
                                const rDate = r.created_at ? new Date(r.created_at * 1000).toLocaleString() : '-';
                                const inputLink = r.input ? `<a href="data:text/plain;charset=utf-8,${encodeURIComponent(r.input)}" target="_blank">Input</a>` : '-';
                                const outputLink = r.output ? `<a href="data:text/plain;charset=utf-8,${encodeURIComponent(r.output)}" target="_blank">Result</a>` : '-';
                                const prompts = r.prompts_hash ? r.prompts_hash.substring(0, 8) : '-';
                                const providerModel = `${r.provider || '-'}/${r.model || '-'}`;
                                
                                let baselineStr = '-';
                                if (r.baseline) {
                                    const parts = [];
                                    if (r.baseline.repo_url) parts.push(r.baseline.repo_url);
                                    if (r.baseline.branch) parts.push(r.baseline.branch);
                                    if (r.baseline.commit) parts.push(r.baseline.commit.substring(0, 8));
                                    baselineStr = parts.join('<br>');
                                }

                                return `
                                    <tr>
                                        <td>${providerModel}</td>
                                        <td>${baselineStr}</td>
                                        <td>${prompts}</td>
                                        <td>${r.result || '-'}</td>
                                        <td>${r.summary || '-'}</td>
                                        <td>${rDate}</td>
                                        <td>${inputLink} | ${outputLink}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                `;
            } else {
                reviewsHtml = '<p>No AI reviews yet.</p>';
            }

            let patchesHtml = '';
            if (data.patches && data.patches.length > 0) {
                 patchesHtml = `
                    <div class="kv" style="align-items: flex-start;">
                        <div class="label">Patches:</div>
                        <div>
                            ${data.patches.map(p => {
                                const link = p.msg_db_id ? `<a href="/static/message.html?id=${p.msg_db_id}">${p.subject || '(no subject)'}</a>` : (p.subject || p.message_id);
                                return `<div>${p.part_index}: ${link}</div>`;
                            }).join('')}
                        </div>
                    </div>
                 `;
            } else {
                patchesHtml = '<div class="kv"><div class="label">Patches:</div><div>None</div></div>';
            }

            let threadHtml = '';
            if (data.thread && data.thread.length > 0) {
                // Build Tree
                const msgMap = new Map();
                const childrenMap = new Map();
                data.thread.forEach(m => {
                    msgMap.set(m.message_id, m);
                    childrenMap.set(m.message_id, []);
                });

                const roots = [];
                data.thread.forEach(m => {
                    const parentId = m.in_reply_to;
                    if (parentId && msgMap.has(parentId)) {
                        childrenMap.get(parentId).push(m);
                    } else {
                        roots.push(m);
                    }
                });

                let rowsHtml = '';
                function renderNode(m, depth) {
                    const mDate = m.date ? new Date(m.date * 1000).toLocaleString() : '-';
                    const indent = depth * 20;
                    const marker = depth > 0 ? '↳ ' : '';
                    
                    rowsHtml += `
                        <tr>
                            <td>${mDate}</td>
                            <td>${m.author || 'unknown'}</td>
                            <td style="padding-left: ${indent + 8}px">
                                ${marker}<a href="/static/message.html?id=${m.id}">${m.subject || '(no subject)'}</a>
                            </td>
                        </tr>
                    `;

                    const children = childrenMap.get(m.message_id) || [];
                    children.forEach(c => renderNode(c, depth + 1));
                }

                roots.forEach(r => renderNode(r, 0));

                threadHtml = `
                    <table class="reviews-table">
                         <thead>
                            <tr>
                                <th>Date</th>
                                <th>Author</th>
                                <th>Subject</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rowsHtml}
                        </tbody>
                    </table>
                `;
            } else {
                threadHtml = '<p>No thread history found.</p>';
            }

            document.getElementById('content').innerHTML = `
                <div class="section">
                    <h2>Metadata</h2>
                    <div class="kv"><div class="label">Subject:</div><div>${data.subject || '(no subject)'}</div></div>
                    <div class="kv"><div class="label">Author:</div><div>${data.author || 'unknown'}</div></div>
                    <div class="kv"><div class="label">Date:</div><div>${date}</div></div>
                    <div class="kv"><div class="label">Status:</div><div class="status-${data.status}">${data.status || 'Pending'}</div></div>
                    <div class="kv"><div class="label">Subsystems:</div><div>${data.subsystems && data.subsystems.length > 0 ? data.subsystems.map(s => `<span class="tag">${s}</span>`).join('') : '-'}</div></div>
                    <div class="kv"><div class="label">Progress:</div><div>${data.received_parts || 0} / ${data.total_parts || 0}</div></div>
                    ${patchesHtml}
                </div>

                <div class="section">
                    <h2>Thread History</h2>
                    ${threadHtml}
                </div>

                <div class="section">
                    <h2>AI Reviews</h2>
                    ${reviewsHtml}
                </div>
            `;
        }

        fetchDetails();

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            // Ignore if input is focused (though no inputs here yet)
            if (document.activeElement.tagName === 'INPUT') return;

            // Scroll Up
            if (e.key === 'k' || e.key === 'ArrowUp' || (e.ctrlKey && e.key === 'p')) {
                if (e.key === 'k' || (e.ctrlKey && e.key === 'p')) {
                    // ArrowUp is handled natively by browser usually, but k/C-p need help
                    window.scrollBy(0, -50);
                }
            }
            // Scroll Down
            else if (e.key === 'j' || e.key === 'ArrowDown' || (e.ctrlKey && e.key === 'n')) {
                if (e.key === 'j' || (e.ctrlKey && e.key === 'n')) {
                    window.scrollBy(0, 50);
                }
            }
            // Back
            else if (e.key === 'q' || e.key === 'h' || e.key === 'ArrowLeft') {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
