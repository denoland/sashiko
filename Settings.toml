log_level = "info"

[database]
url = "sashiko.db"
token = ""

[github]
owner = "denoland"
repo = "deno"
# token = "ghp_..." # Optional: set via SASHIKO_GITHUB__TOKEN or GITHUB_TOKEN env var
poll_interval_secs = 60

[ai]
provider = "gemini"
model = "gemini-3.1-pro-preview"
max_input_tokens = 900000
max_interactions = 50
temperature = 1.0

# To use Claude Code CLI (fixed-cost subscription, no API key needed):
# provider = "claude-cli"
# model = "claude-sonnet-4-6"
# max_input_tokens = 180000
# max_interactions = 150

[ai.claude]
prompt_caching = true

[server]
host = "127.0.0.1"
port = 8080

[git]
repository_path = "third_party/deno"

[review]
concurrency = 20
worktree_dir = "review_trees"
timeout_seconds = 7200
max_retries = 3
ignore_files = [".gitignore"]
